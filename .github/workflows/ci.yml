name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: pre-commit guardrails (LOC / imports / READMEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Run pre-commit on all files
        run: uv run pre-commit run --all-files --show-diff-on-failure

  backend-tests:
    name: backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run pytest
        # --forked isolates the known native-lib (LightGBM/torch) fork crash so
        # one segfaulting test can't take down the whole run. KMP_DUPLICATE_LIB_OK
        # silences the duplicate-OpenMP abort some wheels trigger.
        env:
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: uv run pytest -q --forked

  frontend-build:
    name: frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
